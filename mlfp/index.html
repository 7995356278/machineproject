<!DOCTYPE html>
<html>
<head>
    <title>Machine Failure Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        .container {
            margin-top: 50px;
            padding: 20px;
            background: #1e293b;
            width: 350px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 8px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #16a34a;
        }
        #result {
            margin-top: 15px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚜 Machine Failure Prediction</h2>

    <form id="form">
        <input type="number" id="temperature" placeholder="Temperature" required>
        <input type="number" step="0.01" id="vibration" placeholder="Vibration" required>
        <input type="number" id="pressure" placeholder="Pressure" required>
        <input type="number" id="hours_used" placeholder="Hours Used" required>

        <button type="submit">Predict</button>
    </form>

    <div id="result"></div>
</div>

<script>
document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        temperature: +document.getElementById("temperature").value,
        vibration: +document.getElementById("vibration").value,
        pressure: +document.getElementById("pressure").value,
        hours_used: +document.getElementById("hours_used").value
    };

    try {
        document.getElementById("result").innerText = "Predicting...";

        const res = await fetch("/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        if (!res.ok) {
            const text = await res.text();
            throw new Error(text);
        }

        const result = await res.json();

        document.getElementById("result").innerText =
            result.prediction === 1
            ? "⚠️ Failure Likely"
            : "✅ Machine Safe";

    } catch (err) {
        console.error(err);
        document.getElementById("result").innerText = "Error: " + err.message;
    }
});
</script>

</body>
</html>
